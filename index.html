<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntro-Scripts</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #08090c;
            --bg-card: #0f111a;
            --bg-card-hover: #141724;
            --border-color: #1e2235;
            
            /* Toxic Neon Theme */
            --syntro-green: #00ff66;
            --syntro-glow: rgba(0, 255, 102, 0.15);
            --keyless-color: #00ff66;
            --key-color: #ff3366;
            
            --text-primary: #ffffff;
            --text-secondary: #7e8494;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Consolas', 'Segoe UI', monospace;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            padding: 50px 20px;
            min-height: 100vh;
        }

        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .logo span {
            color: var(--syntro-green);
            text-shadow: 0 0 25px var(--syntro-glow);
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .control-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-browse {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-browse:hover {
            background: var(--text-primary);
            color: var(--bg-main);
            border-color: var(--text-primary);
        }

        .search-field {
            flex: 2;
            min-width: 260px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 6px;
            color: white;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-field:focus {
            border-color: var(--syntro-green);
            box-shadow: 0 0 10px var(--syntro-glow);
        }

        .dropdown-filter {
            flex: 1;
            min-width: 160px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            color: white;
            outline: none;
            cursor: pointer;
        }

        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 35px;
        }

        .script-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .script-card:hover {
            transform: translateY(-4px);
            border-color: var(--syntro-green);
            box-shadow: 0 10px 25px rgba(0, 255, 102, 0.05);
        }

        .meta-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .tag-game {
            background: #1b1f32;
            color: #9aa2be;
        }

        .tag-keyless {
            background: rgba(0, 255, 102, 0.1);
            color: var(--keyless-color);
            border: 1px solid rgba(0, 255, 102, 0.2);
        }

        .tag-key {
            background: rgba(255, 51, 102, 0.1);
            color: var(--key-color);
            border: 1px solid rgba(255, 51, 102, 0.2);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }

        .card-description {
            color: var(--text-secondary);
            font-size: 0.88rem;
            line-height: 1.6;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer-tip {
            font-size: 0.75rem;
            color: var(--syntro-green);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: auto;
        }

        /* Profile Inspect Modal Details */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 5, 7, 0.93);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 9999;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-window {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 850px;
            max-height: 85vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        .modal-topbar {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: white;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-panel {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .info-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .copy-box-container {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .loadstring-display {
            flex: 1;
            background: #050608;
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 6px;
            color: var(--syntro-green);
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: nowrap;
        }

        .btn-copy {
            background: var(--syntro-green);
            color: var(--bg-main);
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: all 0.15s ease;
        }

        .btn-copy:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px var(--syntro-glow);
        }

        .code-viewframe {
            background: #050608;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        pre[class*="language-"] {
            margin: 0 !important;
            background: transparent !important;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="logo">Syntro<span>-Scripts</span></div>
            <p>Premium execution scripts optimized for modern Roblox engines.</p>
            
            <div class="control-panel">
                <button class="btn-browse" onclick="resetFilters()">Browse All</button>
                <input type="text" id="global-search" class="search-field" placeholder="Search parameters..." oninput="runFiltering()">
                <select id="security-dropdown" class="dropdown-filter" onchange="runFiltering()">
                    <option value="all">Any Security</option>
                    <option value="keyless">Keyless Only</option>
                    <option value="key">Requires Key</option>
                </select>
            </div>
        </header>

        <div class="script-grid" id="main-grid-target">
            <p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary);">Connecting to Syntro Node Network...</p>
        </div>
    </div>

    <div class="modal-overlay" id="inspect-modal" onclick="dismissModal()">
        <div class="modal-window" onclick="event.stopPropagation()">
            <div class="modal-topbar">
                <h3 id="modal-script-title" style="font-size:1.2rem; font-weight:bold; color: white;">Script Profile</h3>
                <button class="modal-close" onclick="dismissModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="meta-row" id="modal-meta-tags"></div>
                
                <div class="info-panel">
                    <div class="info-label">Description & Features</div>
                    <div class="info-text" id="modal-description"></div>
                </div>

                <div class="info-panel">
                    <div class="info-label">Executable Loadstring</div>
                    <div class="copy-box-container">
                        <div class="loadstring-display" id="modal-loadstring"></div>
                        <button class="btn-copy" id="modal-copy-btn" onclick="copyLoadstringAction()">Copy</button>
                    </div>
                </div>

                <div class="info-panel">
                    <div class="info-label">Raw Script Preview</div>
                    <div class="code-viewframe">
                        <pre><code class="language-lua" id="lua-render-target"></code></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-lua.min.js"></script>

    <script>
        // Connected to Syntro Cloud Cluster
        const SUPABASE_URL = 'https://yfgwamjvxfvimjwgwjcy.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_irX2aH-DESnTQnYv4cE21Q_mh9WU7wW';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let dbScripts = []; 
        let activeSelectedIdx = null; 

        // Fetch assets asynchronously from table
        async function fetchScriptsFromCloud() {
            try {
                const { data, error } = await supabase
                    .from('scripts')
                    .select('*')
                    .order('title', { ascending: true });

                if (error) throw error;
                
                dbScripts = data;
                paintHub(dbScripts);
            } catch (err) {
                console.error("Cloud Database Error:", err.message);
                document.getElementById('main-grid-target').innerHTML = 
                    `<p style="grid-column: 1/-1; text-align: center; color: var(--key-color);">Failed to fetch assets from network: ${err.message}</p>`;
            }
        }

        // Render card layouts
        function paintHub(arrayData) {
            const targetGrid = document.getElementById('main-grid-target');
            targetGrid.innerHTML = '';

            if (arrayData.length === 0) {
                targetGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-size: 0.9rem; padding: 40px 0;">No scripts match your filter options.</p>`;
                return;
            }

            arrayData.forEach(script => {
                const masterIdx = dbScripts.findIndex(ds => ds.id === script.id);

                const cardNode = document.createElement('div');
                cardNode.className = 'script-card';
                cardNode.setAttribute('onclick', `inspectScript(${masterIdx})`);
                cardNode.innerHTML = `
                    <div>
                        <div class="meta-row">
                            <span class="tag tag-game">${script.game}</span>
                            <span class="tag ${script.is_keyless ? 'tag-keyless' : 'tag-key'}">
                                ${script.is_keyless ? 'Keyless' : 'Key System'}
                            </span>
                        </div>
                        <div class="card-title">${script.title}</div>
                        <div class="card-description">${script.description}</div>
                    </div>
                    <div class="card-footer-tip">Click to Inspect System //</div>
                `;
                targetGrid.appendChild(cardNode);
            });
        }

        // Active Inspect Modal Presentation
        function inspectScript(index) {
            activeSelectedIdx = index;
            const targetData = dbScripts[index];

            document.getElementById('modal-script-title').innerText = `${targetData.title} // Global Data Sheet`;
            document.getElementById('modal-description').innerText = targetData.description || "No further details available for this module.";
            document.getElementById('modal-loadstring').innerText = targetData.loadstring;

            document.getElementById('modal-meta-tags').innerHTML = `
                <span class="tag tag-game">${targetData.game}</span>
                <span class="tag ${targetData.is_keyless ? 'tag-keyless' : 'tag-key'}">
                    ${targetData.is_keyless ? 'Keyless' : 'Key System'}
                </span>
            `;

            const rawOutputBlock = document.getElementById('lua-render-target');
            rawOutputBlock.textContent = targetData.source_code || "-- No code source file added to database cluster.";
            Prism.highlightElement(rawOutputBlock);

            document.getElementById('inspect-modal').classList.add('active');
        }

        // Copy Execution Action inside modal panel Workspace
        function copyLoadstringAction() {
            if (activeSelectedIdx === null) return;
            const payload = dbScripts[activeSelectedIdx].loadstring;
            const copyBtn = document.getElementById('modal-copy-btn');

            navigator.clipboard.writeText(payload).then(() => {
                const nativeTxt = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                copyBtn.style.background = "#ffffff";
                copyBtn.style.color = "#000000";
                
                setTimeout(() => {
                    copyBtn.innerText = nativeTxt;
                    copyBtn.style.background = "var(--syntro-green)";
                    copyBtn.style.color = "var(--bg-main)";
                }, 1400);
            });
        }

        // Dropdown + Live Search Filtering Algorithm
        function runFiltering() {
            const textMatch = document.getElementById('global-search').value.toLowerCase();
            const securityMatch = document.getElementById('security-dropdown').value;

            const structuredData = dbScripts.filter(element => {
                let checkSecurity = true;
                if (securityMatch === 'keyless') checkSecurity = element.is_keyless === true;
                if (securityMatch === 'key') checkSecurity = element.is_keyless === false;

                const checkText = element.title.toLowerCase().includes(textMatch) ||
                                  element.game.toLowerCase().includes(textMatch) ||
                                  element.description.toLowerCase().includes(textMatch);

                return checkSecurity && checkText;
            });

            paintHub(structuredData);
        }

        function resetFilters() {
            document.getElementById('global-search').value = '';
            document.getElementById('security-dropdown').value = 'all';
            paintHub(dbScripts);
        }

        function dismissModal() {
            document.getElementById('inspect-modal').classList.remove('active');
            activeSelectedIdx = null;
        }

        // Initialize cloud retrieval on execution initialization
        fetchScriptsFromCloud();
    </script>
</body>
</html>
