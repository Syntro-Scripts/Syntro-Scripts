<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntro-Scripts</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #08090c;
            --bg-card: #0f111a;
            --bg-card-hover: #141724;
            --border-color: #1e2235;
            
            /* Toxic Neon Theme */
            --syntro-green: #00ff66;
            --syntro-glow: rgba(0, 255, 102, 0.15);
            --keyless-color: #00ff66;
            --key-color: #ff3366;
            
            --text-primary: #ffffff;
            --text-secondary: #7e8494;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Consolas', 'Segoe UI', monospace;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            padding: 50px 20px;
            min-height: 100vh;
        }

        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Rebranded Top Header styling */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .logo span {
            color: var(--syntro-green);
            text-shadow: 0 0 25px var(--syntro-glow);
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Control Panel Design */
        .control-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-browse {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-browse:hover {
            background: var(--text-primary);
            color: var(--bg-main);
            border-color: var(--text-primary);
        }

        .search-field {
            flex: 2;
            min-width: 260px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 6px;
            color: white;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-field:focus {
            border-color: var(--syntro-green);
            box-shadow: 0 0 10px var(--syntro-glow);
        }

        .dropdown-filter {
            flex: 1;
            min-width: 160px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            color: white;
            outline: none;
            cursor: pointer;
        }

        /* Reconfigured Script Grid Items */
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 35px;
        }

        .script-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .script-card:hover {
            transform: translateY(-4px);
            border-color: var(--syntro-green);
            box-shadow: 0 10px 25px rgba(0, 255, 102, 0.05);
        }

        .meta-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .tag-game {
            background: #1b1f32;
            color: #9aa2be;
        }

        .tag-keyless {
            background: rgba(0, 255, 102, 0.1);
            color: var(--keyless-color);
            border: 1px solid rgba(0, 255, 102, 0.2);
        }

        .tag-key {
            background: rgba(255, 51, 102, 0.1);
            color: var(--key-color);
            border: 1px solid rgba(255, 51, 102, 0.2);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }

        .card-description {
            color: var(--text-secondary);
            font-size: 0.88rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Action Buttons */
        .action-container {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.15s ease;
        }

        .btn-copy-load {
            background: var(--syntro-green);
            color: var(--bg-main);
            box-shadow: 0 4px 12px rgba(0, 255, 102, 0.15);
        }

        .btn-copy-load:hover {
            opacity: 0.9;
            box-shadow: 0 4px 20px rgba(0, 255, 102, 0.3);
        }

        .btn-view-src {
            background: #171a26;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-view-src:hover {
            background: #202435;
            border-color: #3f4769;
        }

        /* Code Viewer Modal Panel */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 5, 7, 0.9);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 9999;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-window {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 850px;
            max-height: 80vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        .modal-topbar {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.6rem;
            cursor: pointer;
        }

        .modal-close:hover {
            color: white;
        }

        .modal-viewframe {
            padding: 20px;
            overflow-y: auto;
            background: #050608;
        }

        pre[class*="language-"] {
            margin: 0 !important;
            background: transparent !important;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="logo">Syntro<span>-Scripts</span></div>
            <p>Premium execution scripts optimized for modern Roblox engines.</p>
            
            <div class="control-panel">
                <button class="btn-browse" onclick="resetFilters()">Browse All</button>
                <input type="text" id="global-search" class="search-field" placeholder="Search parameters (e.g. game, feature, name)..." oninput="runFiltering()">
                <select id="security-dropdown" class="dropdown-filter" onchange="runFiltering()">
                    <option value="all">Any Security</option>
                    <option value="keyless">Keyless Only</option>
                    <option value="key">Requires Key</option>
                </select>
            </div>
        </header>

        <div class="script-grid" id="main-grid-target">
            </div>
    </div>

    <div class="modal-overlay" id="src-modal" onclick="dismissModal()">
        <div class="modal-window" onclick="event.stopPropagation()">
            <div class="modal-topbar">
                <h3 id="modal-script-title" style="font-size:1.1rem; font-weight:bold;">Source Code View</h3>
                <button class="modal-close" onclick="dismissModal()">&times;</button>
            </div>
            <div class="modal-viewframe">
                <pre><code class="language-lua" id="lua-render-target"></code></pre>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-lua.min.js"></script>

    <script>
        // System Master Database Array
        const dbScripts = [
            {
                title: "Syntro V2 Hub",
                game: "Bedwars",
                isKeyless: true,
                description: "Full network bypass infrastructure featuring silent aimbot, dynamic fly speeds, and automated infinite iron loop processing.",
                loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/SyntroHub/Releases/main/BedwarsV2.lua"))()`,
                sourceCode: `-- Syntro Framework V2\nlocal CoreSystem = {}\nprint("Syntro Network Auth: Success")`
            },
            {
                title: "Blox Fruits Autofarm",
                game: "Blox Fruits",
                isKeyless: false,
                description: "Automated standard level farming, dynamic sea selection optimization, raid bypass execution engines, and direct fruit sniper systems.",
                loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/SyntroHub/Releases/main/BloxFruits.lua"))()`,
                sourceCode: `-- Security Verification Interface Needed\nfunction VerifyUser()\n    print("Checking active key...")\nend`
            },
            {
                title: "Universal Dex Explorer",
                game: "Universal",
                isKeyless: true,
                description: "Robust property inspector designed to easily trace internal game remote function structures and instance variables dynamically.",
                loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/InfDex/Dex/main/main.lua"))()`,
                sourceCode: `-- Open Source Utility\nlocal Root = game:GetService("Workspace")\nprint("Target Node Root Directory Linked: " .. Root.ClassName)`
            }
        ];

        // Central UI Painting Module
        function paintHub(arrayData) {
            const targetGrid = document.getElementById('main-grid-target');
            targetGrid.innerHTML = '';

            if (arrayData.length === 0) {
                targetGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-size: 0.9rem; padding: 40px 0;">No scripts match your filter options.</p>`;
                return;
            }

            arrayData.forEach(script => {
                // Determine original static positioning to keep hooks secure
                const masterIdx = dbScripts.findIndex(ds => ds.title === script.title);

                const cardNode = document.createElement('div');
                cardNode.className = 'script-card';
                cardNode.innerHTML = `
                    <div>
                        <div class="meta-row">
                            <span class="tag tag-game">${script.game}</span>
                            <span class="tag ${script.isKeyless ? 'tag-keyless' : 'tag-key'}">
                                ${script.isKeyless ? 'Keyless' : 'Key System'}
                            </span>
                        </div>
                        <div class="card-title">${script.title}</div>
                        <div class="card-description">${script.description}</div>
                    </div>
                    <div class="action-container">
                        <button class="action-btn btn-copy-load" onclick="copyAction(${masterIdx}, this)">Copy Loadstring</button>
                        <button class="action-btn btn-view-src" onclick="triggerSourceView(${masterIdx})">View Code</button>
                    </div>
                `;
                targetGrid.appendChild(cardNode);
            });
        }

        // Search & Security Filtration Algorithm
        function runFiltering() {
            const textMatch = document.getElementById('global-search').value.toLowerCase();
            const securityMatch = document.getElementById('security-dropdown').value;

            const structuredData = dbScripts.filter(element => {
                let checkSecurity = true;
                if (securityMatch === 'keyless') checkSecurity = element.isKeyless === true;
                if (securityMatch === 'key') checkSecurity = element.isKeyless === false;

                const checkText = element.title.toLowerCase().includes(textMatch) ||
                                  element.game.toLowerCase().includes(textMatch) ||
                                  element.description.toLowerCase().includes(textMatch);

                return checkSecurity && checkText;
            });

            paintHub(structuredData);
        }

        // Browse All (Clear Interface Control)
        function resetFilters() {
            document.getElementById('global-search').value = '';
            document.getElementById('security-dropdown').value = 'all';
            paintHub(dbScripts);
        }

        // Copy Clipboard Management Action
        function copyAction(index, element) {
            const payload = dbScripts[index].loadstring;
            navigator.clipboard.writeText(payload).then(() => {
                const nativeString = element.innerText;
                element.innerText = "Copied to Clipboard!";
                element.style.background = "#ffffff";
                element.style.color = "#000000";
                
                setTimeout(() => {
                    element.innerText = nativeString;
                    element.style.background = "var(--syntro-green)";
                    element.style.color = "var(--bg-main)";
                }, 1400);
            });
        }

        // Source Code Overlay Activation Action
        function triggerSourceView(index) {
            const dataNode = dbScripts[index];
            document.getElementById('modal-script-title').innerText = dataNode.title + " // Source File Tree";
            
            const rawOutputBlock = document.getElementById('lua-render-target');
            rawOutputBlock.textContent = dataNode.sourceCode;
            
            Prism.highlightElement(rawOutputBlock);
            document.getElementById('src-modal').classList.add('active');
        }

        function dismissModal() {
            document.getElementById('src-modal').classList.remove('active');
        }

        // Initialize Rendering Engine Sequence
        paintHub(dbScripts);
    </script>
</body>
</html>
