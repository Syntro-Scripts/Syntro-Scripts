<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Hub</title>
    <style>
        :root {
            --bg-primary: #121214;
            --bg-secondary: #1a1a1e;
            --accent: #00bcd4;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        偏side-bar {
            width: 250px;
            background-color: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a30;
        }

        .brand {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            text-align: center;
            border-bottom: 1px solid #2a2a30;
        }

        .nav-links {
            list-style: none;
            padding: 20px 10px;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--accent);
            color: var(--bg-primary);
            font-weight: 600;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        header {
            padding: 20px;
            background-color: var(--bg-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a30;
        }

        .search-bar {
            width: 300px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2a2a30;
            background: var(--bg-primary);
            color: var(--text-main);
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent);
        }

        .container {
            padding: 30px;
        }

        /* Script Grid Layout */
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .script-card {
            background-color: var(--bg-secondary);
            border: 1px solid #2a2a30;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .script-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .script-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .script-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .btn-copy {
            background-color: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-copy:hover {
            opacity: 0.9;
        }

        /* Utility class to hide sections */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="side-bar">
        <div class="brand">ScriptHub</div>
        <ul class="nav-links">
            <li class="nav-item active" onclick="switchCategory('all')">All Scripts</li>
            <li class="nav-item" onclick="switchCategory('automation')">Automation</li>
            <li class="nav-item" onclick="switchCategory('utility')">Utilities</li>
        </ul>
    </div>

    <div class="main-content">
        <header>
            <h2 id="category-title">All Scripts</h2>
            <input type="text" id="search" class="search-bar" placeholder="Search scripts..." oninput="filterScripts()">
        </header>

        <div class="container">
            <div class="script-grid" id="script-container">
                </div>
        </div>
    </div>

    <script>
        // Centralized Script Data
        const scripts = [
            {
                title: "Auto-Refresh Page",
                description: "Automatically reloads the target website every 30 seconds to monitor changes.",
                category: "automation",
                code: "setInterval(() => { location.reload(); }, 30000);"
            },
            {
                title: "DOM Element Extractor",
                description: "Extracts and logs specific data fragments from the target website layout.",
                category: "utility",
                code: "console.log(document.querySelectorAll('.target-class'));"
            },
            {
                title: "Form Auto-Filler",
                description: "Speeds up testing workflows by auto-populating repetitive inputs.",
                category: "automation",
                code: "document.querySelectorAll('input').forEach(i => i.value = 'Test');"
            }
        ];

        let currentCategory = 'all';

        // Render scripts dynamically
        function renderScripts() {
            const container = document.getElementById('script-container');
            const searchQuery = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';

            const filtered = scripts.filter(script => {
                const matchesCategory = currentCategory === 'all' || script.category === currentCategory;
                const matchesSearch = script.title.toLowerCase().includes(searchQuery) || 
                                      script.description.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<p style="color: var(--text-muted);">No scripts found.</p>`;
                return;
            }

            filtered.forEach(script => {
                const card = document.createElement('div');
                card.className = 'script-card';
                card.innerHTML = `
                    <div>
                        <div class="script-title">${script.title}</div>
                        <div class="script-desc">${script.description}</div>
                    </div>
                    <button class="btn-copy" onclick="copyToClipboard(\`${btoa(script.code)}\`, this)">Copy Script</button>
                `;
                container.appendChild(card);
            });
        }

        // Handle category switching
        function switchCategory(category) {
            currentCategory = category;
            
            // Update active menu styling
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if(item.getAttribute('onclick').includes(category)) {
                    item.classList.add('active');
                }
            });

            // Update title
            document.getElementById('category-title').innerText = 
                category.charAt(0).toUpperCase() + category.slice(1) + ' Scripts';

            renderScripts();
        }

        // Live search filtering
        function filterScripts() {
            renderScripts();
        }

        // Clipboard handler (safeguarded against quote escaping using base64)
        function copyToClipboard(base64Code, button) {
            const code = atob(base64Code);
            navigator.clipboard.writeText(code).then(() => {
                const originalText = button.innerText;
                button.innerText = "Copied!";
                button.style.backgroundColor = "#4caf50";
                setTimeout(() => {
                    button.innerText = originalText;
                    button.style.backgroundColor = "var(--accent)";
                }, 1500);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }

        // Initial paint
        renderScripts();
    </script>
</body>
</html>
