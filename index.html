<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntro Scripts - Gatekeeper</title>
    <style>
        /* Modern Dark Theme styling */
        body {
            background-color: #0b0b0e;
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #12121a;
            border: 1px solid #1f1f2e;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 480px;
            width: 90%;
        }

        h1 {
            color: #5865F2; /* Branding color */
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 8px;
            font-weight: 700;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .loader {
            color: #38bdf8;
            font-size: 14px;
            margin: 20px 0;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 130px;
            background: #07070a;
            color: #4ade80; /* Script green */
            border: 1px solid #2e2e42;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            font-size: 13px;
            resize: none;
            box-sizing: border-box;
            outline: none;
            display: none; /* Hidden until loaded */
        }

        textarea:focus {
            border-color: #5865F2;
        }

        button {
            background: #5865F2;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            margin-top: 20px;
            width: 100%;
            transition: background 0.2s ease;
            display: none; /* Hidden until loaded */
        }

        button:hover {
            background: #4752c4;
        }

        button:active {
            background: #3c45a3;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Syntro Scripts</h1>
    <p id="statusText">Verifying checkpoint completion and preparing your secure loader...</p>
    
    <div id="loadingIndicator" class="loader">Generating Key...</div>
    
    <textarea id="luaScript" readonly></textarea>
    <button id="copyBtn" onclick="copyScript()">Copy Gatekeeper Script</button>
</div>

<script>
    // --- CONFIGURATION ---
    // Replace this URL with your actual Supabase project URL once we set up Website B
    const SUPABASE_FUNCTION_URL = "https://YOUR_PROJECT_ID.supabase.co/functions/v1/gatekeeper";
    const TARGET_SCRIPT = "MainCheat"; 

    // Auto-fetch key when the user arrives (e.g., redirected back from LootLabs)
    async function fetchGatekeeperKey() {
        const loadingIndicator = document.getElementById("loadingIndicator");
        const luaScriptBox = document.getElementById("luaScript");
        const copyButton = document.getElementById("copyBtn");
        const statusText = document.getElementById("statusText");

        try {
            // Post to your future Edge function requesting a key for this specific script
            const response = await fetch(`${SUPABASE_FUNCTION_URL}?action=generate`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ script_name: TARGET_SCRIPT })
            });

            if (!response.ok) {
                throw new Error("Server rejected request");
            }

            const data = await response.json();
            
            if (data.key) {
                // Construct the dynamic wrapper script that executors will run
                const generatedCode = `-- Syntro Scripts Gatekeeper\n` +
                                      `local key = "${data.key}"\n` +
                                      `local api = "${SUPABASE_FUNCTION_URL}?action=verify&key=" .. key\n` +
                                      `loadstring(game:HttpGet(api))()`;
                
                // Update UI elements
                loadingIndicator.style.display = "none";
                statusText.innerText = "Key generated! Run the code below in your executor.";
                
                luaScriptBox.value = generatedCode;
                luaScriptBox.style.display = "block";
                copyButton.style.display = "block";
            } else {
                showError("Invalid server response schema.");
            }
        } catch (err) {
            showError("Failed to reach verification servers. Ensure your link pass was valid.");
        }
    }

    function showError(message) {
        document.getElementById("loadingIndicator").style.display = "none";
        const status = document.getElementById("statusText");
        status.innerText = message;
        status.style.color = "#ef4444";
    }

    function copyScript() {
        const copyText = document.getElementById("luaScript");
        copyText.select();
        copyText.setSelectionRange(0, 99999); // Mobile compatibility
        
        navigator.clipboard.writeText(copyText.value);
        
        const btn = document.getElementById("copyBtn");
        btn.innerText = "Copied!";
        btn.style.background = "#22c55e"; // Success green
        
        setTimeout(() => {
            btn.innerText = "Copy Gatekeeper Script";
            btn.style.background = "#5865F2";
        }, 2000);
    }

    // Trigger execution
    window.onload = fetchGatekeeperKey;
</script>

</body>
</html>
