<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Script Hub</title>
    <!-- Prism.js CSS for Dark Theme Lua Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-darker: #0d0e12;
            --bg-card: #161820;
            --accent-blue: #00a2ff;
            --accent-green: #00e676;
            --text-white: #f5f6f7;
            --text-dark: #8a8f98;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-white);
            padding: 40px 20px;
        }

        .hub-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--text-white);
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--accent-blue);
        }

        header p {
            color: var(--text-dark);
            margin-top: 10px;
        }

        .search-container {
            max-width: 500px;
            margin: 20px auto 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid #252836;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-blue);
        }

        /* Script Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid #252836;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #383c52;
        }

        .badge {
            align-self: flex-start;
            background: rgba(0, 162, 255, 0.1);
            color: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            color: var(--text-dark);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 24px;
            flex-grow: 1;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s, color 0.2s;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #008cdb;
        }

        .btn-secondary {
            background: #252836;
            color: var(--text-white);
        }

        .btn-secondary:hover {
            background: #313549;
        }

        /* Modal Overlay for viewing raw code */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid #252836;
            width: 100%;
            max-width: 800px;
            max-height: 80vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #252836;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-dark);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-modal:hover {
            color: white;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            background: #111218;
        }

        pre[class*="language-"] {
            margin: 0 !important;
            background: transparent !important;
        }
    </style>
</head>
<body>

    <div class="hub-wrapper">
        <header>
            <h1>Roblox<span>ScriptHub</span></h1>
            <p>Optimized loadstrings and raw scripts for modern executors.</p>
            <div class="search-container">
                <input type="text" id="search" class="search-input" placeholder="Search by game name or script type..." oninput="searchScripts()">
            </div>
        </header>

        <div class="grid" id="script-grid">
            <!-- Dynamic Injection Box -->
        </div>
    </div>

    <!-- View Code Modal -->
    <div class="modal" id="code-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">Script Source</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre><code class="language-lua" id="code-block"></code></pre>
            </div>
        </div>
    </div>

    <!-- Prism JS core for rendering Lua colorization dynamically -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-lua.min.js"></script>

    <script>
        // Paste your scripts right into this database array
        const robloxScripts = [
            {
                title: "BedWars Auto-Farm",
                game: "Bedwars",
                description: "Killaura, Infinite Infamy points, auto-shop buyer, and speed utilities.",
                // Loadstring is what copies instantly on primary click
                loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/ExampleUser/RobloxBuilds/main/Bedwars.lua"))()`,
                // Raw source code displayed in the modal
                sourceCode: `-- Bedwars Script Framework\nlocal Killaura = true\nlocal LocalPlayer = game.Players.LocalPlayer\n\nprint("BedWars Framework Loaded for " .. LocalPlayer.Name)`
            },
            {
                title: "Blox Fruits Autofarm & ESP",
                game: "Blox Fruits",
                description: "Fast attack bypass, auto-leveling island to island, chest tracking, and devil fruit snipers.",
                loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/ExampleUser/RobloxBuilds/main/BloxFruits.lua"))()`,
                sourceCode: `-- BloxFruits Macro\nlocal Workspace = game:GetService("Workspace")\nprint("Chest ESP Enabled: " .. tostring(Workspace.Chests:GetChildren()))`
            },
            {
                title: "Universal Dex Explorer",
                game: "Universal",
                description: "Deep game tree structure visualizer. Essential for debugging properties and remote event mapping.",
                loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/InfDex/Dex/main/main.lua"))()`,
                sourceCode: `-- Universal Dark Dex clone\nlocal CoreGui = game:GetService("CoreGui")\nlocal DexWindow = Instance.new("ScreenGui", CoreGui)\nDexWindow.Name = "DexExplorer"`
            }
        ];

        function renderHub(data) {
            const grid = document.getElementById('script-grid');
            grid.innerHTML = '';

            if(data.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: var(--text-dark);">No exploits found matching that search parameters.</p>`;
                return;
            }

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <span class="badge">${item.game}</span>
                        <div class="card-title">${item.title}</div>
                        <div class="card-desc">${item.description}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-primary" onclick="copyLoadstring(${index}, this)">Copy Loadstring</button>
                        <button class="btn btn-secondary" onclick="viewSource(${index})">View Source</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function searchScripts() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = robloxScripts.filter(s => 
                s.title.toLowerCase().includes(query) || 
                s.game.toLowerCase().includes(query) || 
                s.description.toLowerCase().includes(query)
            );
            renderHub(filtered);
        }

        function copyLoadstring(index, button) {
            const txt = robloxScripts[index].loadstring;
            navigator.clipboard.writeText(txt).then(() => {
                const prevText = button.innerText;
                button.innerText = "Copied Loadstring!";
                button.style.background = var(--accent-green);
                setTimeout(() => {
                    button.innerText = prevText;
                    button.style.background = "var(--accent-blue)";
                }, 1200);
            });
        }

        function viewSource(index) {
            const target = robloxScripts[index];
            document.getElementById('modal-title').innerText = target.title + " - Raw Code";
            
            const codeBlock = document.getElementById('code-block');
            codeBlock.textContent = target.sourceCode;
            
            // Forces Prism library to rebuild the syntax highlights for the raw Lua string
            Prism.highlightElement(codeBlock);
            
            document.getElementById('code-modal').classList.add('active');
        }

        function closeModal(e) {
            document.getElementById('code-modal').classList.remove('active');
        }

        // Initialize Paint
        renderHub(robloxScripts);
    </script>
</body>
</html>
