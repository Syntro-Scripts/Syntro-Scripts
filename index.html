<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Script Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-darker: #0d0e12;
            --bg-card: #161820;
            --accent-blue: #00a2ff;
            --accent-green: #00e676;
            --accent-orange: #ff9100;
            --text-white: #f5f6f7;
            --text-dark: #8a8f98;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-white);
            padding: 40px 20px;
        }

        .hub-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--text-white);
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--accent-blue);
        }

        /* Controls Section (Search, Filters, Browse) */
        .controls-container {
            max-width: 800px;
            margin: 30px auto 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .search-input {
            flex: 2;
            min-width: 250px;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid #252836;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-blue);
        }

        .filter-select {
            flex: 1;
            min-width: 150px;
            padding: 14px;
            background: var(--bg-card);
            border: 1px solid #252836;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        .btn-browse-all {
            padding: 14px 24px;
            background: #252836;
            color: white;
            border: 1px solid #383c52;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-browse-all:hover {
            background: #313549;
            border-color: var(--accent-blue);
        }

        /* Script Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid #252836;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #383c52;
        }

        .badge-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(0, 162, 255, 0.1);
            color: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Dynamic Key Status Styling */
        .badge.keyless {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-green);
        }

        .badge.needs-key {
            background: rgba(255, 145, 0, 0.1);
            color: var(--accent-orange);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            color: var(--text-dark);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 24px;
            flex-grow: 1;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s, color 0.2s;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #008cdb;
        }

        .btn-secondary {
            background: #252836;
            color: var(--text-white);
        }

        .btn-secondary:hover {
            background: #313549;
        }

        /* Modal Overlay */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid #252836;
            width: 100%;
            max-width: 800px;
            max-height: 80vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #252836;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-dark);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-modal:hover {
            color: white;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            background: #111218;
        }

        pre[class*="language-"] {
            margin: 0 !important;
            background: transparent !important;
        }
    </style>
</head>
<body>

    <div class="hub-wrapper">
        <header>
            <h1>Roblox<span>ScriptHub</span></h1>
            <div class="controls-container">
                <button class="btn-browse-all" onclick="browseAll()">Browse All</button>

                <input type="text" id="search" class="search-input" placeholder="Search by game, script title, features..." oninput="applyFilters()">
                
                <select id="key-filter" class="filter-select" onchange="applyFilters()">
                    <option value="all">Any Security</option>
                    <option value="keyless">Keyless Only</option>
                    <option value="hasKey">Requires Key</option>
                </select>
            </div>
        </header>

        <div class="grid" id="script-grid">
            </div>
    </div>

    <div class="modal" id="code-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">Script Source</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre><code class="language-lua" id="code-block"></code></pre>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-lua.min.js"></script>

    <script>
        // Database Array: Added "isKeyless" boolean configuration
        const robloxScripts = [
            {
                title: "BedWars Auto-Farm",
                game: "Bedwars",
                isKeyless: true,
                description: "Killaura, Infinite Infamy points, auto-shop buyer, and speed utilities.",
                loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/Example/Bedwars.lua"))()`,
                sourceCode: `-- Bedwars Framework\nprint("BedWars Loaded Framework")`
            },
            {
                title: "Blox Fruits Hub",
                game: "Blox Fruits",
                isKeyless: false, 
                description: "Fast attack bypass, auto-leveling island to island, chest tracking.",
                loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/Example/BloxFruits.lua"))()`,
                sourceCode: `-- BloxFruits Macro\nprint("Key Verification Passed. Loading...")`
            },
            {
                title: "Universal Dex Explorer",
                game: "Universal",
                isKeyless: true,
                description: "Deep game tree structure visualizer. Essential for debugging properties and remote events.",
                loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/InfDex/Dex/main/main.lua"))()`,
                sourceCode: `-- Universal Dark Dex clone\nprint("Dex Initialized")`
            }
        ];

        // Central DOM Renderer Engine
        function renderHub(data) {
            const grid = document.getElementById('script-grid');
            grid.innerHTML = '';

            if(data.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: var(--text-dark); margin-top: 20px;">No matching scripts found in database.</p>`;
                return;
            }

            data.forEach((item) => {
                // Determine original indexing back to master array for button hooks
                const originalIndex = robloxScripts.findIndex(s => s.title === item.title);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <div class="badge-row">
                            <span class="badge">${item.game}</span>
                            <span class="badge ${item.isKeyless ? 'keyless' : 'needs-key'}">
                                ${item.isKeyless ? 'Keyless' : 'Key System'}
                            </span>
                        </div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-desc">${item.description}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-primary" onclick="copyLoadstring(${originalIndex}, this)">Copy Loadstring</button>
                        <button class="btn btn-secondary" onclick="viewSource(${originalIndex})">View Source</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Handles multi-parameter filtering processing (Combines Key Filter + Search text matching)
        function applyFilters() {
            const searchQuery = document.getElementById('search').value.toLowerCase();
            const keyFilterValue = document.getElementById('key-filter').value;

            const filteredData = robloxScripts.filter(script => {
                // Check security type constraint
                let matchesKey = true;
                if (keyFilterValue === 'keyless') matchesKey = script.isKeyless === true;
                if (keyFilterValue === 'hasKey') matchesKey = script.isKeyless === false;

                // Check text query matching strings
                const matchesSearch = script.title.toLowerCase().includes(searchQuery) || 
                                      script.game.toLowerCase().includes(searchQuery) || 
                                      script.description.toLowerCase().includes(searchQuery);

                return matchesKey && matchesSearch;
            });

            renderHub(filteredData);
        }

        // Global Browse Reset execution handler
        function browseAll() {
            document.getElementById('search').value = '';
            document.getElementById('key-filter').value = 'all';
            renderHub(robloxScripts);
        }

        function copyLoadstring(index, button) {
            const txt = robloxScripts[index].loadstring;
            navigator.clipboard.writeText(txt).then(() => {
                const prevText = button.innerText;
                button.innerText = "Copied Loadstring!";
                button.style.background = "var(--accent-green)";
                setTimeout(() => {
                    button.innerText = prevText;
                    button.style.background = "var(--accent-blue)";
                }, 1200);
            });
        }

        function viewSource(index) {
            const target = robloxScripts[index];
            document.getElementById('modal-title').innerText = target.title + " - Raw Code";
            
            const codeBlock = document.getElementById('code-block');
            codeBlock.textContent = target.sourceCode;
            
            Prism.highlightElement(codeBlock);
            document.getElementById('code-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('code-modal').classList.remove('active');
        }

        // Boot system sequence
        renderHub(robloxScripts);
    </script>
</body>
</html>
